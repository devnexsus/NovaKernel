    <style>
        /* ---------- Reset & Base ---------- */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
            background: #07070e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 10% 20%, rgba(255, 215, 0, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(255, 20, 147, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 200, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ---------- Card ---------- */
        .card {
            max-width: 680px;
            width: 100%;
            background: linear-gradient(160deg, #0d0d22, #151535, #0d0d22);
            border-radius: 48px;
            padding: 48px 38px 56px;
            box-shadow:
                0 30px 90px rgba(0, 0, 0, 0.9),
                0 0 0 1px rgba(255, 215, 0, 0.08),
                inset 0 1px 0 rgba(255, 215, 0, 0.06);
            text-align: center;
            position: relative;
            overflow: hidden;
            z-index: 1;
            backdrop-filter: blur(2px);
            transition: box-shadow 0.5s ease;
        }

        .card:hover {
            box-shadow:
                0 40px 120px rgba(0, 0, 0, 0.95),
                0 0 0 1px rgba(255, 215, 0, 0.15),
                inset 0 1px 0 rgba(255, 215, 0, 0.08);
        }

        /* Glow orbs inside card */
        .card .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            opacity: 0.3;
            z-index: 0;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            top: -150px;
            right: -150px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.15), transparent 70%);
            animation: float-orb 8s ease-in-out infinite alternate;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            bottom: -100px;
            left: -100px;
            background: radial-gradient(circle, rgba(255, 20, 147, 0.15), transparent 70%);
            animation: float-orb 10s ease-in-out infinite alternate-reverse;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(0, 200, 255, 0.06), transparent 70%);
            animation: float-orb 12s ease-in-out infinite alternate;
        }

        @keyframes float-orb {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(30px, -30px) scale(1.1);
            }
        }

        /* Top gold shimmer line */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 5%;
            width: 90%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, #f7971e, #ffd700, transparent);
            opacity: 0.7;
            border-radius: 100%;
            z-index: 1;
            animation: shimmer-line 3s ease-in-out infinite;
        }

        @keyframes shimmer-line {
            0%,
            100% {
                opacity: 0.4;
                transform: scaleX(0.95);
            }
            50% {
                opacity: 1;
                transform: scaleX(1);
            }
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
            z-index: 1;
        }

        /* ---------- MARQUEE – PINK (TOP, REPLACES HEADLINE) ---------- */
        .marquee-wrap {
            position: relative;
            z-index: 2;
            background: linear-gradient(135deg, rgba(255, 20, 147, 0.15), rgba(255, 20, 147, 0.05));
            border-radius: 60px;
            padding: 16px 20px;
            margin: 0 0 20px;
            border: 1.5px solid rgba(255, 20, 147, 0.2);
            box-shadow: 0 0 50px rgba(255, 20, 147, 0.08), inset 0 0 40px rgba(255, 20, 147, 0.03);
            overflow: hidden;
            backdrop-filter: blur(4px);
        }

        .marquee {
            display: flex;
            align-items: center;
            gap: 30px;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            white-space: nowrap;
            animation: marquee-scroll 16s linear infinite;
            color: #ff1493;
            text-shadow: 0 0 40px rgba(255, 20, 147, 0.15);
        }

        .marquee i {
            color: #ff1493;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .marquee .star {
            color: #ffd700;
            font-size: 1.1rem;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        .marquee .vip-text {
            background: linear-gradient(135deg, #ff1493, #ff6eb4, #ff1493);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: 0.12em;
            padding: 0 10px;
            text-shadow: none;
            filter: drop-shadow(0 0 30px rgba(255, 20, 147, 0.15));
        }

        .marquee .crown-icon {
            color: #ffd700;
            font-size: 1.3rem;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
        }

        @keyframes marquee-scroll {
            0% {
                transform: translateX(100%);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        /* ---------- Profile Image with Rings ---------- */
        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin: 10px auto 20px;
        }

        /* Outer gold ring */
        .ring-outer {
            position: absolute;
            top: -12px;
            left: -12px;
            width: calc(100% + 24px);
            height: calc(100% + 24px);
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #ffd700;
            border-bottom-color: #f7971e;
            animation: spin 3.5s linear infinite;
            pointer-events: none;
            z-index: 0;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.2));
        }

        /* Inner pink ring (reverse) */
        .ring-inner {
            position: absolute;
            top: -5px;
            left: -5px;
            width: calc(100% + 10px);
            height: calc(100% + 10px);
            border-radius: 50%;
            border: 2.5px solid transparent;
            border-left-color: rgba(255, 20, 147, 0.6);
            border-right-color: rgba(0, 200, 255, 0.4);
            animation: spin-reverse 4.5s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        /* Pulsing ring glow */
        .ring-pulse {
            position: absolute;
            top: -20px;
            left: -20px;
            width: calc(100% + 40px);
            height: calc(100% + 40px);
            border-radius: 50%;
            border: 2px solid rgba(255, 215, 0, 0.1);
            animation: pulse-ring 2.8s ease-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes spin-reverse {
            to {
                transform: rotate(-360deg);
            }
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(1);
                opacity: 0.7;
                border-color: rgba(255, 215, 0, 0.2);
            }
            100% {
                transform: scale(1.35);
                opacity: 0;
                border-color: rgba(255, 215, 0, 0);
            }
        }

        .profile-image {
            position: relative;
            z-index: 1;
            width: 190px;
            height: 190px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ffd700;
            box-shadow:
                0 0 60px rgba(255, 215, 0, 0.2),
                inset 0 0 40px rgba(255, 215, 0, 0.05);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.5s ease;
            display: block;
        }

        .profile-image:hover {
            transform: scale(1.04) rotate(-2deg);
            box-shadow:
                0 0 80px rgba(255, 215, 0, 0.35),
                0 0 120px rgba(255, 215, 0, 0.1);
        }

        /* ---------- Verification Badge (Gold) ---------- */
        .verification-badge {
            position: absolute;
            bottom: 6px;
            right: 6px;
            z-index: 10;
            background: linear-gradient(135deg, #ffd700, #f7971e);

            height: 44px;

            align-items: center;
            justify-content: center;
            border: 3px solid #0d0d22;
            box-shadow:
                0 0 30px rgba(255, 215, 0, 0.5),

            animation: badge-glow 2.2s ease-in-out infinite alternate;

            color: #0b0b1a;

            100% {

                transform: scale(1.05);

        /* ---------- Sub-headline ---------- */
        .sub-headline {

        .sub-headline span {

        /* ---------- Buttons ---------- */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 6px;
            position: relative;

        .btn {

            color: #0b0b1a;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: skewX(-25deg);
            transition: left 0.7s ease;
        }

        .btn:hover::before {
            left: 150%;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.01);
        }

        .btn:active {
            transform: translateY(2px) scale(0.98);

        .btn-gold {
